<html>
    <head>
        <link rel="stylesheet" href="style.css">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Share+Tech&display=swap" rel="stylesheet"> 
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
    </head>
    <body>
    <div id="menuOverlay" class="menu-overlay"></div>

    <div class="upbox">
       &nbsp;&nbsp;&nbsp; <img src="logo.png" width="70px" alt="Logo">
      <span class="brand-name">AMR SAKR</span>
      <div class="upboxs">
        <button id="menuBtn" class="menu-btn" type="button" aria-label="Open menu">
          <img src="menu.png" width="60px" alt="Menu">
        </button>
      </div>
    </div>

    <aside id="sideMenu" class="side-menu" aria-label="Main menu">
      <button id="closeMenu" class="close-menu" type="button" aria-label="Close menu">×</button>
      <h2>AMR SAKR</h2>
      <a href="#">SIGN IN</a>
      <a href="#">FREE SESSIONS</a>
      <a href="#">BOOK SESSIONS</a>
      <a href="#">CONTACT</a>
    </aside>
    <br><br><br><br>
    <center><img src="logo.png" width="350px">
    <br><br>
<button id="btn">SIGN IN</button>
<button id="btn">FREE SESSIONS</button>
<button id="btn">BOOK SESSIONS</button>


<br><br><br><br><br><br><br><br>


</center>

    <script>
      const menuBtn = document.getElementById('menuBtn');
      const sideMenu = document.getElementById('sideMenu');
      const overlay = document.getElementById('menuOverlay');
      const closeMenu = document.getElementById('closeMenu');

      function openMenu() {
        sideMenu.classList.add('open');
        overlay.classList.add('show');
        document.body.style.overflow = 'hidden';
      }

      function closeMenuPanel() {
        sideMenu.classList.remove('open');
        overlay.classList.remove('show');
        document.body.style.overflow = '';
      }

      menuBtn.addEventListener('click', openMenu);
      closeMenu.addEventListener('click', closeMenuPanel);
      overlay.addEventListener('click', closeMenuPanel);

      document.addEventListener('keydown', function (event) {
        if (event.key === 'Escape') {
          closeMenuPanel();
        }
      });
    </script>
    </body>
</html>
